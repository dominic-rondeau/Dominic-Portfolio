<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dominic Rondeau</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="static/css/style.css"
    />
  </head>
  <body class="app-shell">
    <nav class="navbar navbar-expand-lg border-bottom border-secondary-subtle bg-body sticky-top shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">About</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#primaryNav"
          aria-controls="primaryNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="primaryNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="resume.html">Resume</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    
        <section class="content-card p-4 mt-4 text-center">
        <h2 class="h4 mb-3">Click to look closer (Updated January 2026)</h2>
        <img
            class="smallCenter"
            data-bs-toggle="modal" 
            data-bs-target="#imageModal" 
            onclick="setImageSrc('static/images/resume.png')"
            src="static/images/resume.png"
            alt="Dominic Rondeau's resume"
        />
        
        </section>
        
<div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body">
        <img src="" class="img-fluid" id="modalImage" alt="Zoomed image">
      </div>
    </div>
  </div>
</div>
<script>
    function setImageSrc(src) {
        document.getElementById('modalImage').src = src;
        }
</script>

    <footer class="border-top border-secondary-subtle py-4 mt-auto bg-body">
      <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2 small text-muted">
        <span>Dominic Rondeau Personal Portfolio</span>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
